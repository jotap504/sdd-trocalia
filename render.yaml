services:
  - type: web
    name: tradealo-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # ── Database (Supabase) ──────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      # ── Redis (Upstash) ─────────────────────────────────────────────────────
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      # ── JWT ─────────────────────────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_SESSION_TIMEOUT
        value: "7200"
      # ── Cloudflare R2 ────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      # ── MercadoPago ─────────────────────────────────────────────────────────
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: MP_NOTIFICATION_URL
        sync: false
      # ── App ─────────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        sync: false
      # ── KYC Encryption ──────────────────────────────────────────────────────
      - key: KYC_ENCRYPTION_KEY
        sync: false
